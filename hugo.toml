title = "danhill.us"
baseURL = "http://localhost:1313/"
disableKinds = ["taxonomy", "term"]

[module]
workspace = "off"

[[module.imports]]
path = "github.com/dan-hill/site-base"

[params]
description = "Landing node for work, dispatches, and docs."

[params.ox]
mode = "landing"
tagline = "PUBLIC BBS / DISPATCH BOARD / PROJECT SWITCH"
