  '   / _ | / ___// __ \/ / / /   / |  / /   /  _/ |/ /',
  '  / __ |/ /__ / /_/ / /_/ /   /  |_/ /   _/ //    / ',
  ' /_/ |_|\___/ \____/\____/   /_/|___/   /___/_/|_/  ',
  ' [ PUBLIC BBS // PROJECT SWITCH // SIGNAL BOARD ]',
]
masthead_ascii_compact = ["[ DANHILL.US :: SIGNAL BOARD ]"]
landing_routes = [
  { label = "PROJECT INDEX", url = "/projects/", note = "Shipped, building, lab, and archive work in dense operator rows." },
  { label = "DISPATCHES", url = "/posts/", note = "Short field notes, release traces, and station logs." },
  { label = "DOCS", url = "https://docs.danhill.us/", note = "Manuals, maps, and maintenance references." },
  { label = "ABOUT", url = "/about/", note = "What this node is trying to be and how it is wired." },
]

